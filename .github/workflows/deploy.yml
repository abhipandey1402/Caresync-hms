name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.target_environment || 'production' }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: "20"

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      API_HOST: 127.0.0.1
      PORT: 3000
      MONGODB_URI: mongodb://127.0.0.1:27017/hms_test
      JWT_PRIVATE_KEY: ${{ secrets.TEST_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.TEST_JWT_PUBLIC_KEY }}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      AWS_REGION: ap-south-1
      AWS_SSM_PREFIX: /caresync
      S3_BUCKET_NAME: test-bucket
      S3_PRESIGN_EXPIRES: 900
      SQS_WHATSAPP_QUEUE_URL: https://sqs.test.amazonaws.com/test/whatsapp
      SQS_SMS_QUEUE_URL: https://sqs.test.amazonaws.com/test/sms
      SQS_PDF_QUEUE_URL: https://sqs.test.amazonaws.com/test/pdf
      SQS_REPORT_QUEUE_URL: https://sqs.test.amazonaws.com/test/report
      SES_FROM_EMAIL: ops@example.com
      WABA_PHONE_ID: test-phone-id
      WABA_ACCESS_TOKEN: test-waba-token
      SMS_API_KEY: test-sms-key
      SMS_SENDER_ID: CRSYNC
      ABDM_BASE_URL: https://abdm.example.com
      ABDM_CLIENT_ID: test-abdm-client-id
      ABDM_CLIENT_SECRET: test-abdm-client-secret
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
      FRONTEND_URL: http://localhost:5173
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_MAX: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run backend tests with coverage gate
        working-directory: apps/api
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":70}}'

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build frontend artifact
        run: npm run build -w apps/web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  deploy:
    name: Deploy release
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'production' }}
    permissions:
      contents: read
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'production' }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'caresync-api' }}
      IMAGE_TAG: ${{ github.sha }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/caresync' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'ubuntu' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Sync frontend to S3
        run: aws s3 sync apps/web/dist s3://${{ secrets.WEB_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"

      - name: Copy production compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: infra/docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy API and worker on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,DEPLOY_PATH
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH/infra"
            mv "$DEPLOY_PATH/docker-compose.prod.yml" "$DEPLOY_PATH/infra/docker-compose.prod.yml"
            cd "$DEPLOY_PATH"
            export ECR_REGISTRY="$ECR_REGISTRY"
            export ECR_REPOSITORY="$ECR_REPOSITORY"
            export IMAGE_TAG="$IMAGE_TAG"
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose -f infra/docker-compose.prod.yml pull
            docker compose -f infra/docker-compose.prod.yml up -d api worker
            docker image prune -af --filter "until=168h"
            echo "Deploy complete at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
