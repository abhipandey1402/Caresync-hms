name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Deployment placeholder
        run: |
          echo "Configure deployment secrets:"
          echo "DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH"
