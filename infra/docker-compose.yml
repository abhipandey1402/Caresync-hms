version: "3.9"

services:
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w apps/api"
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ../:/app
    env_file:
      - ../.env

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w apps/web"
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ../:/app
    env_file:
      - ../.env
    depends_on:
      - api
