version: "3.9"

services:
  api:
    image: ${ECR_REGISTRY:?err}/${ECR_REPOSITORY:-caresync-api}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - ../.env
    environment:
      PORT: 8080
      API_HOST: 0.0.0.0

  worker:
    image: ${ECR_REGISTRY:?err}/${ECR_REPOSITORY:-caresync-api}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["npm", "run", "worker", "-w", "apps/api"]
    env_file:
      - ../.env
