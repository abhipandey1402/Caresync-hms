version: "3.9"

services:
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && npm run start -w apps/api"
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ../:/app
    env_file:
      - ../.env

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build -w apps/web"
    volumes:
      - ../:/app
    env_file:
      - ../.env

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/web/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - web
